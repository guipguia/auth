run:
  timeout: 5m
  skip-files:
    - ".*\\.pb\\.go$"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert

linters-settings:
  errcheck:
    check-type-assertions: false
    # Ignore errors from audit/logging functions - these are intentionally fire-and-forget
    exclude-functions:
      - (*github.com/guipguia/auth/internal/service.AuditService).LogAction
      - (*github.com/guipguia/auth/internal/service.AuditService).LogUserAction
      - (*github.com/guipguia/auth/internal/service.AuditService).LogSessionAction
      - (*github.com/guipguia/auth/internal/service.auditService).LogAction
      - (*github.com/guipguia/auth/internal/service.auditService).LogUserAction
      - (*github.com/guipguia/auth/internal/service.auditService).LogSessionAction
      - (github.com/guipguia/auth/internal/service.AuditService).LogAction
      - (github.com/guipguia/auth/internal/service.AuditService).LogUserAction
      - (github.com/guipguia/auth/internal/service.AuditService).LogSessionAction
      - (*github.com/guipguia/auth/internal/service.LoginProtectionService).RecordLoginAttempt
      - (*github.com/guipguia/auth/internal/service.loginProtectionService).RecordLoginAttempt
      - (github.com/guipguia/auth/internal/service.LoginProtectionService).RecordLoginAttempt
      - (*github.com/spf13/viper.Viper).BindEnv
      - (*github.com/spf13/viper.Viper).SetDefault
      - (github.com/guipguia/auth/internal/repository.SessionRepository).Revoke
  govet:
    enable-all: true
    disable:
      - fieldalignment
      - shadow
  goimports:
    local-prefixes: github.com/guipguia/auth
  staticcheck:
    checks:
      - all
      - -SA1029  # Allow string context keys for now
      - -SA9003  # Allow empty branches

issues:
  exclude-rules:
    # Ignore errcheck in tests
    - path: _test\.go
      linters:
        - errcheck
    # Ignore unused writes in tests (test setup)
    - path: _test\.go
      linters:
        - govet
      text: "unusedwrite"
    # Ignore unparam in service layer (interface compliance)
    - path: internal/service/
      linters:
        - unparam
    # Ignore ineffassign for message variable pattern
    - linters:
        - ineffassign
      text: "ineffectual assignment to message"
