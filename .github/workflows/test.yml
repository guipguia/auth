name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: auth_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "28.x"

      - name: Install dependencies and generate proto
        run: |
          go mod download
          make install-tools
          make proto

      - name: Run tests with coverage
        env:
          AUTH_DATABASE_HOST: localhost
          AUTH_DATABASE_PORT: 5432
          AUTH_DATABASE_USER: postgres
          AUTH_DATABASE_PASSWORD: postgres
          AUTH_DATABASE_DBNAME: auth_db
          AUTH_DATABASE_SSLMODE: disable
          AUTH_JWT_ACCESS_TOKEN_SECRET: test-access-secret-for-ci
          AUTH_JWT_REFRESH_TOKEN_SECRET: test-refresh-secret-for-ci
        run: make test-all

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "28.x"

      - name: Generate protobuf files
        run: |
          make install-tools
          make proto

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.7.2

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "28.x"

      - name: Generate protobuf files
        run: |
          make install-tools
          make proto

      - name: Build
        run: make build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: auth-server
          path: bin/auth-server
