apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "auth-service.fullname" . }}
  labels:
    {{- include "auth-service.labels" . | nindent 4 }}
data:
  # Server configuration
  server.port: {{ .Values.server.port | quote }}

  # Logging configuration
  logging.level: {{ .Values.logging.level | quote }}
  logging.format: {{ .Values.logging.format | quote }}

  # Database configuration
  database.host: {{ .Values.database.host | quote }}
  database.port: {{ .Values.database.port | quote }}
  database.name: {{ .Values.database.name | quote }}
  database.user: {{ .Values.database.user | quote }}
  database.sslmode: {{ .Values.database.sslmode | quote }}
  database.maxOpenConns: {{ .Values.database.maxOpenConns | quote }}
  database.maxIdleConns: {{ .Values.database.maxIdleConns | quote }}
  database.connMaxLifetime: {{ .Values.database.connMaxLifetime | quote }}

  # Redis configuration
  redis.address: {{ .Values.redis.address | quote }}
  redis.db: {{ .Values.redis.db | quote }}
  redis.dialTimeout: {{ .Values.redis.dialTimeout | quote }}
  redis.readTimeout: {{ .Values.redis.readTimeout | quote }}
  redis.writeTimeout: {{ .Values.redis.writeTimeout | quote }}
  redis.poolSize: {{ .Values.redis.poolSize | quote }}

  # JWT configuration
  jwt.accessExpiry: {{ .Values.jwt.accessExpiry | quote }}
  jwt.refreshExpiry: {{ .Values.jwt.refreshExpiry | quote }}
  jwt.issuer: {{ .Values.jwt.issuer | quote }}

  # Email configuration
  email.enabled: {{ .Values.email.enabled | quote }}
  email.from: {{ .Values.email.from | quote }}
  email.smtp.host: {{ .Values.email.smtp.host | quote }}
  email.smtp.port: {{ .Values.email.smtp.port | quote }}
  email.smtp.useTLS: {{ .Values.email.smtp.useTLS | quote }}

  # OAuth configuration
  oauth.google.enabled: {{ .Values.oauth.google.enabled | quote }}
  oauth.google.redirectUrl: {{ .Values.oauth.google.redirectUrl | quote }}
  oauth.github.enabled: {{ .Values.oauth.github.enabled | quote }}
  oauth.github.redirectUrl: {{ .Values.oauth.github.redirectUrl | quote }}
  oauth.microsoft.enabled: {{ .Values.oauth.microsoft.enabled | quote }}
  oauth.microsoft.redirectUrl: {{ .Values.oauth.microsoft.redirectUrl | quote }}

  # Tenant service configuration
  tenant.serviceUrl: {{ .Values.tenant.serviceUrl | quote }}
  tenant.timeout: {{ .Values.tenant.timeout | quote }}
