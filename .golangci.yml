version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
  settings:
    errcheck:
      check-type-assertions: false
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
  exclusions:
    generated: lax
    rules:
      # Exclude test files from errcheck
      - path: _test\.go
        linters:
          - errcheck
      # Exclude test files from govet unusedwrite
      - path: _test\.go
        linters:
          - govet
        text: "unusedwrite"
    paths:
      - ".*\\.pb\\.go$"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/guipguia/auth
