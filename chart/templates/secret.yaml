apiVersion: v1
kind: Secret
metadata:
  name: {{ include "auth-service.fullname" . }}
  labels:
    {{- include "auth-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Database password
  database.password: {{ .Values.database.password | quote }}

  # Redis password
  redis.password: {{ .Values.redis.password | quote }}

  # JWT secrets
  jwt.accessSecret: {{ .Values.jwt.accessSecret | quote }}
  jwt.refreshSecret: {{ .Values.jwt.refreshSecret | quote }}

  # Encryption key
  encryption.key: {{ .Values.encryption.key | quote }}

  # Email/SMTP credentials
  email.smtp.username: {{ .Values.email.smtp.username | quote }}
  email.smtp.password: {{ .Values.email.smtp.password | quote }}

  # OAuth secrets
  oauth.google.clientId: {{ .Values.oauth.google.clientId | quote }}
  oauth.google.clientSecret: {{ .Values.oauth.google.clientSecret | quote }}
  oauth.github.clientId: {{ .Values.oauth.github.clientId | quote }}
  oauth.github.clientSecret: {{ .Values.oauth.github.clientSecret | quote }}
  oauth.microsoft.clientId: {{ .Values.oauth.microsoft.clientId | quote }}
  oauth.microsoft.clientSecret: {{ .Values.oauth.microsoft.clientSecret | quote }}
